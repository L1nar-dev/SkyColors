name: Build SkyColors

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: |
          gradle wrapper --gradle-version 8.14
          ./gradlew jar

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: SkyColors
          path: build/libs/SkyColors.jar
